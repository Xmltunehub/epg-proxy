<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPG Sync Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3f;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --positive: #00c896;
    --negative: #ff4757;
    --warning: #ffa502;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  /* Header */
  header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .logo-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1px;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 100px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .status-dot.ok { background: var(--positive); box-shadow: 0 0 8px var(--positive); animation: pulse 2s infinite; }
  .status-dot.warn { background: var(--warning); }
  .status-dot.err { background: var(--negative); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Controls row */
  .controls-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  @media (max-width: 600px) {
    .controls-row { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .url-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .url-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    flex: 1;
    word-break: break-all;
    line-height: 1.5;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { background: #33eeff; transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: transparent;
    color: var(--negative);
    border: 1px solid var(--negative);
  }
  .btn-danger:hover { background: var(--negative); color: #fff; }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Bulk offset */
  .bulk-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .offset-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    padding: 9px 14px;
    width: 90px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .offset-input:focus { outline: none; border-color: var(--accent); }

  .offset-label {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* Search */
  .search-row {
    margin-bottom: 16px;
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    padding: 12px 16px 12px 44px;
    transition: border-color 0.2s;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  /* Channels list */
  .channels-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .channels-count {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .channels-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 600px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .channels-list::-webkit-scrollbar { width: 4px; }
  .channels-list::-webkit-scrollbar-track { background: var(--bg); border-radius: 4px; }
  .channels-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .channel-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    transition: border-color 0.15s, background 0.15s;
  }

  .channel-row:hover { border-color: var(--border); background: var(--surface2); }
  .channel-row.modified { border-color: var(--accent2); }

  .channel-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .channel-id {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .offset-stepper {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .step-btn {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .step-btn:hover { border-color: var(--accent); color: var(--accent); }

  .offset-val {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    width: 52px;
    text-align: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 4px;
    transition: border-color 0.15s;
  }
  .offset-val:focus { outline: none; border-color: var(--accent); }

  .offset-val.positive { color: var(--positive); }
  .offset-val.negative { color: var(--negative); }
  .offset-val.zero { color: var(--muted); }

  .save-btn-small {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: #000;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    opacity: 0;
    transform: scale(0.8);
  }
  .save-btn-small.visible { opacity: 1; transform: scale(1); }
  .save-btn-small:hover { background: #33eeff; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 100;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.ok { border-color: var(--positive); color: var(--positive); }
  .toast.err { border-color: var(--negative); color: var(--negative); }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    gap: 16px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    line-height: 2;
  }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-tab {
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .filter-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .filter-tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <span class="logo-tag">// EPG Manager v1.0</span>
      <h1>EPG <span>Sync</span></h1>
    </div>
    <div class="status-bar">
      <div class="status-pill" id="status-pill">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">A verificar...</span>
      </div>
      <button class="btn btn-ghost" onclick="refreshEPG()" id="refresh-btn">
        ↻ Atualizar EPG
      </button>
    </div>
  </header>

  <!-- URL do EPG -->
  <div class="controls-row">
    <div class="card">
      <div class="card-title">URL do teu EPG corrigido</div>
      <div class="url-box">
        <span class="url-text" id="epg-url">A carregar...</span>
        <button class="btn btn-primary" onclick="copyUrl()" style="padding:8px 12px;font-size:12px;">Copiar</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Offset global (aplicar a todos)</div>
      <div class="bulk-row">
        <input type="number" class="offset-input" id="bulk-offset" value="60" min="-43200" max="43200">
        <span class="offset-label">segundos</span>
        <button class="btn btn-primary" onclick="applyBulk()">Aplicar a todos</button>
      </div>
    </div>
  </div>

  <!-- Canais -->
  <div class="card">
    <div class="card-title">Canais — offset por canal</div>

    <div class="search-row">
      <span class="search-icon">⌕</span>
      <input type="text" class="search-input" id="search" placeholder="Pesquisar canal..." oninput="filterChannels()">
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all', this)">Todos</button>
      <button class="filter-tab" onclick="setFilter('modified', this)">Modificados</button>
      <button class="filter-tab" onclick="setFilter('zero', this)">Sem offset</button>
    </div>

    <div class="channels-header">
      <span class="channels-count" id="channels-count">— canais</span>
    </div>

    <div class="channels-list" id="channels-list">
      <div class="loading">
        <div class="spinner"></div>
        <span>A carregar canais...</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allChannels = [];
let currentFilter = 'all';
const DEFAULT_OFFSET = 60; // 60 segundos

async function init() {
  await loadStatus();
  await loadChannels();
  setEPGUrl();
}

function setEPGUrl() {
  const url = window.location.origin + '/epg.xml';
  document.getElementById('epg-url').textContent = url;
}

async function loadStatus() {
  try {
    const r = await fetch('/api/status');
    const data = await r.json();
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    if (data.last_update) {
      const d = new Date(data.last_update);
      const fmt = d.toLocaleString('pt-PT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
      dot.className = 'status-dot ok';
      text.textContent = 'Atualizado: ' + fmt;
    } else {
      dot.className = 'status-dot warn';
      text.textContent = 'Aguarda primeira atualização';
    }
  } catch {
    document.getElementById('status-dot').className = 'status-dot err';
    document.getElementById('status-text').textContent = 'Erro de ligação';
  }
}

async function loadChannels() {
  try {
    const r = await fetch('/api/channels');
    allChannels = await r.json();
    renderChannels();
  } catch {
    document.getElementById('channels-list').innerHTML =
      '<div class="empty">Erro ao carregar canais.<br>O EPG ainda pode estar a ser processado.</div>';
  }
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  filterChannels();
}

function filterChannels() {
  const q = document.getElementById('search').value.toLowerCase();
  renderChannels(q);
}

function renderChannels(q = '') {
  let channels = allChannels.filter(ch => {
    const match = ch.name.toLowerCase().includes(q) || ch.id.toLowerCase().includes(q);
    if (!match) return false;
    if (currentFilter === 'modified') return ch.offset !== DEFAULT_OFFSET;
    if (currentFilter === 'zero') return ch.offset === 0;
    return true;
  });

  document.getElementById('channels-count').textContent = channels.length + ' canais';

  if (channels.length === 0) {
    document.getElementById('channels-list').innerHTML =
      '<div class="empty">Nenhum canal encontrado.</div>';
    return;
  }

  document.getElementById('channels-list').innerHTML = channels.map(ch => {
    const isModified = ch.offset !== DEFAULT_OFFSET;
    const cls = isModified ? 'channel-row modified' : 'channel-row';
    const valCls = ch.offset > 0 ? 'positive' : ch.offset < 0 ? 'negative' : 'zero';
    return `
      <div class="${cls}" id="row-${CSS.escape(ch.id)}" data-id="${ch.id}" data-original="${ch.offset}">
        <div>
          <div class="channel-name">${escHtml(ch.name)}</div>
          <div class="channel-id">${escHtml(ch.id)}</div>
        </div>
        <div class="offset-stepper">
          <button class="step-btn" onclick="step('${ch.id}', -30)">−</button>
          <input class="offset-val ${valCls}" type="number" value="${ch.offset}"
            id="inp-${CSS.escape(ch.id)}"
            onchange="onOffsetChange('${ch.id}')"
            oninput="onOffsetChange('${ch.id}')"
            min="-43200" max="43200">
          <button class="step-btn" onclick="step('${ch.id}', 30)">+</button>
        </div>
        <button class="save-btn-small" id="save-${CSS.escape(ch.id)}" onclick="saveChannel('${ch.id}')">✓</button>
      </div>
    `;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function step(id, delta) {
  const inp = document.getElementById('inp-' + CSS.escape(id));
  inp.value = parseInt(inp.value || 0) + delta;
  onOffsetChange(id);
}

function onOffsetChange(id) {
  const inp = document.getElementById('inp-' + CSS.escape(id));
  const saveBtn = document.getElementById('save-' + CSS.escape(id));
  const val = parseInt(inp.value);
  inp.className = 'offset-val ' + (val > 0 ? 'positive' : val < 0 ? 'negative' : 'zero');
  saveBtn.classList.add('visible');

  // Update local state
  const ch = allChannels.find(c => c.id === id);
  if (ch) ch.offset = val;
}

async function saveChannel(id) {
  const inp = document.getElementById('inp-' + CSS.escape(id));
  const val = parseInt(inp.value);
  try {
    await fetch('/api/offset', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ channel_id: id, offset: val })
    });
    const saveBtn = document.getElementById('save-' + CSS.escape(id));
    saveBtn.classList.remove('visible');
    const row = document.getElementById('row-' + CSS.escape(id));
    if (val !== DEFAULT_OFFSET) row.classList.add('modified');
    else row.classList.remove('modified');
    showToast('Guardado ✓', 'ok');
  } catch {
    showToast('Erro ao guardar', 'err');
  }
}

async function applyBulk() {
  const offset = parseInt(document.getElementById('bulk-offset').value);
  if (isNaN(offset)) { showToast('Offset inválido', 'err'); return; }
  try {
    const r = await fetch('/api/offset/bulk', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ offset })
    });
    const data = await r.json();
    allChannels.forEach(ch => ch.offset = offset);
    renderChannels(document.getElementById('search').value.toLowerCase());
    showToast(`Offset ${offset >= 0 ? '+' : ''}${offset}s aplicado a ${data.applied_to} canais`, 'ok');
  } catch {
    showToast('Erro ao aplicar offset global', 'err');
  }
}

async function refreshEPG() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '↻ A atualizar...';
  try {
    await fetch('/api/refresh', { method: 'POST' });
    showToast('Atualização iniciada — pode demorar alguns minutos', 'ok');
    setTimeout(async () => {
      await loadStatus();
      await loadChannels();
      btn.disabled = false;
      btn.textContent = '↻ Atualizar EPG';
    }, 8000);
  } catch {
    showToast('Erro ao iniciar atualização', 'err');
    btn.disabled = false;
    btn.textContent = '↻ Atualizar EPG';
  }
}

function copyUrl() {
  const url = window.location.origin + '/epg.xml';
  navigator.clipboard.writeText(url).then(() => showToast('URL copiado!', 'ok'));
}

let toastTimer;
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

init();
setInterval(loadStatus, 60000);
</script>
</body>
</html>
